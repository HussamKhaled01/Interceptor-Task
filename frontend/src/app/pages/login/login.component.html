<div class="login-wrapper">
  <div class="login-card">
    <h2>Sign In</h2>
    <p class="subtitle">Interceptor Auth Demo</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="email"
          placeholder="you@example.com"
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </div>

      @if (error) {
        <p class="error">{{ error }}</p>
      }

      <button type="submit" [disabled]="loading || loginForm.invalid">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="hint">
      <small>Seeded user: <strong>demo&#64;demo.com</strong> / <strong>Demo&#64;1234</strong></small>
    </div>
  </div>
</div>
